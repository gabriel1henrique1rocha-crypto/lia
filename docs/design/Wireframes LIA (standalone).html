document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {

        s.removeAttribute('src');

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {

    }

    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

n    <\u002Fdiv>\n    <p class=\"board__lead\">Lista de comentários pendentes; cada item traz nome, texto, resenha vinculada e ações aprovar / rejeitar / excluir. Contador de pendentes no topo.<\u002Fp>\n\n    <div class=\"frames\">\n\n      <!-- 4A queue -->\n      <figure class=\"frame\">\n        <figcaption class=\"frame__cap\"><span class=\"frame__id\">4A<\u002Fspan><span class=\"what\">Fila — com pendentes<\u002Fspan><span class=\"pill\">base<\u002Fspan><\u002Ffigcaption>\n        <div class=\"screen\">\n          <div class=\"region\"><span class=\"lm\">header · admin<\u002Fspan>\n            <div class=\"wf-top\"><span class=\"wordmark\">LIA<span class=\"dot\">.<\u002Fspan> <span style=\"font-size:10px;font-family:var(--mono);color:var(--mut);\">admin<\u002Fspan><\u002Fspan>\n              <nav class=\"nav\"><span>Resenhas<\u002Fspan><span class=\"cur\">Comentários<\u002Fspan><span>Sair<\u002Fspan><\u002Fnav><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"region\"><span class=\"lm\">main<\u002Fspan>\n            <div class=\"row between mb8\" style=\"align-items:center;\">\n              <span class=\"h-title\" style=\"width:150px;\"><\u002Fspan>\n              <span class=\"row gap6\" style=\"align-items:center;\"><span style=\"font-size:12px;color:var(--soft);\">Pendentes<\u002Fspan><span class=\"badge-count\">12<\u002Fspan><span class=\"cn\">1<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n\n            <div class=\"col gap8\" style=\"gap:10px;display:flex;\">\n              <div class=\"qitem\">\n                <div class=\"row between\"><div class=\"row gap8\"><span class=\"avatar\"><\u002Fspan><span class=\"l\" style=\"width:90px;\"><\u002Fspan><\u002Fdiv><span class=\"qmeta\">há 2 h<\u002Fspan><\u002Fdiv>\n                <div class=\"lines\"><span class=\"l sm w100\"><\u002Fspan><span class=\"l sm w80\"><\u002Fspan><\u002Fdiv>\n                <div class=\"qmeta\">em: <span style=\"text-decoration:underline;\">A hora da estrela<\u002Fspan> <span class=\"cn\" style=\"margin-left:4px;\">2<\u002Fspan><\u002Fdiv>\n                <div class=\"row gap6\"><span class=\"btn sm primary\">Aprovar<\u002Fspan><span class=\"btn sm\">Rejeitar<\u002Fspan><span class=\"btn sm ghost\">Excluir<\u002Fspan><span class=\"cn\" style=\"align-self:center;\">3<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"qitem\">\n                <div class=\"row between\"><div class=\"row gap8\"><span class=\"avatar\"><\u002Fspan><span class=\"l\" style=\"width:110px;\"><\u002Fspan><\u002Fdiv><span class=\"qmeta\">há 5 h<\u002Fspan><\u002Fdiv>\n                <div class=\"lines\"><span class=\"l sm w100\"><\u002Fspan><span class=\"l sm w60\"><\u002Fspan><\u002Fdiv>\n                <div class=\"qmeta\">em: <span style=\"text-decoration:underline;\">Grande sertão: veredas<\u002Fspan><\u002Fdiv>\n                <div class=\"row gap6\"><span class=\"btn sm primary\">Aprovar<\u002Fspan><span class=\"btn sm\">Rejeitar<\u002Fspan><span class=\"btn sm ghost\">Excluir<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"qitem\">\n                <div class=\"row between\"><div class=\"row gap8\"><span class=\"avatar\"><\u002Fspan><span class=\"l\" style=\"width:80px;\"><\u002Fspan><\u002Fdiv><span class=\"qmeta\">ontem<\u002Fspan><\u002Fdiv>\n                <div class=\"lines\"><span class=\"l sm w90\"><\u002Fspan><\u002Fdiv>\n                <div class=\"qmeta\">em: <span style=\"text-decoration:underline;\">Memórias póstumas<\u002Fspan><\u002Fdiv>\n                <div class=\"row gap6\"><span class=\"btn sm primary\">Aprovar<\u002Fspan><span class=\"btn sm\">Rejeitar<\u002Fspan><span class=\"btn sm ghost\">Excluir<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"pager mt14\"><span class=\"pg\">‹<\u002Fspan><span class=\"pg on\">1<\u002Fspan><span class=\"pg\">2<\u002Fspan><span class=\"pg\">›<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Ffigure>\n\n      <!-- 4B focus on action -->\n      <figure class=\"frame\">\n        <figcaption class=\"frame__cap\"><span class=\"frame__id\">4B<\u002Fspan><span class=\"what\">Foco de teclado — ação<\u002Fspan><span class=\"pill\">estado<\u002Fspan><\u002Ffigcaption>\n        <div class=\"screen narrow\">\n          <div class=\"region\"><span class=\"lm\">main<\u002Fspan>\n            <div class=\"qitem\">\n              <div class=\"row between\"><div class=\"row gap8\"><span class=\"avatar\"><\u002Fspan><span class=\"l\" style=\"width:90px;\"><\u002Fspan><\u002Fdiv><span class=\"qmeta\">há 2 h<\u002Fspan><\u002Fdiv>\n              <div class=\"lines\"><span class=\"l sm w100\"><\u002Fspan><span class=\"l sm w80\"><\u002Fspan><\u002Fdiv>\n              <div class=\"qmeta\">em: <span style=\"text-decoration:underline;\">A hora da estrela<\u002Fspan><\u002Fdiv>\n              <div class=\"row gap6\"><span class=\"btn sm primary foc\">Aprovar<\u002Fspan><span class=\"btn sm\">Rejeitar<\u002Fspan><span class=\"btn sm ghost\">Excluir<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"foc-note\">Cada item é uma região com grupo de ações; Tab percorre Aprovar → Rejeitar → Excluir com anel de foco 3px. Excluir pede confirmação.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Ffigure>\n\n      <!-- 4C empty -->\n      <figure class=\"frame\">\n        <figcaption class=\"frame__cap\"><span class=\"frame__id\">4C<\u002Fspan><span class=\"what\">Fila vazia<\u002Fspan><span class=\"pill\">estado vazio<\u002Fspan><\u002Ffigcaption>\n        <div class=\"screen narrow\">\n          <div class=\"region\"><span class=\"lm\">main<\u002Fspan>\n            <div class=\"row between mb8\" style=\"align-items:center;\">\n              <span class=\"h-title\" style=\"width:150px;\"><\u002Fspan>\n              <span class=\"row gap6\" style=\"align-items:center;\"><span style=\"font-size:12px;color:var(--soft);\">Pendentes<\u002Fspan><span class=\"badge-count\" style=\"background:var(--mut);\">0<\u002Fspan><\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"empty\" role=\"status\">\n              <div class=\"ic\" aria-hidden=\"true\">✓<\u002Fdiv>\n              <div class=\"big\">Tudo em dia<\u002Fdiv>\n              <div>Nenhum comentário aguardando moderação.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Ffigure>\n\n    <\u002Fdiv>\n\n    <div class=\"notes\" aria-label=\"Notas de acessibilidade — Tela 4\">\n      <h3>Notas de acessibilidade — Tela 4<\u002Fh3>\n      <ol>\n        <li><span class=\"cn\">1<\u002Fspan><span><b>Contador de pendentes:<\u002Fb> número em texto + região atualizada anunciável quando a fila muda.<\u002Fspan><\u002Fli>\n        <li><span class=\"cn\">2<\u002Fspan><span><b>Resenha vinculada:<\u002Fb> link sublinhado para a resenha de origem (abre o contexto do comentário).<\u002Fspan><\u002Fli>\n        <li><span class=\"cn\">3<\u002Fspan><span><b>Ações por item:<\u002Fb> Aprovar (primária) · Rejeitar · Excluir; agrupadas e rotuladas; Excluir confirma antes de remover.<\u002Fspan><\u002Fli>\n      <\u002Fol>\n      <div class=\"ro\"><b>Ordem de leitura / foco:<\u002Fb> título → contador → 1º item (autor → texto → resenha vinculada → ações) → próximos itens → paginação. <b>Vazio (4C):<\u002Fb> confirmação positiva “tudo em dia” em <code>role=\"status\"<\u002Fcode>.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============================================================= INVENTORY -->\n  <section class=\"inv\" aria-labelledby=\"inv\">\n    <h2 id=\"inv\">Componentes novos para o Design System<\u002Fh2>\n    <p>Padrões que apareceram nestes wireframes e ainda não existem nos fundamentos do LIA (hoje: Button, Link, Field, Card). Candidatos a especificar depois.<\u002Fp>\n    <div class=\"inv-grid\">\n      <div class=\"inv-card\"><h4>Review card<\u002Fh4><span class=\"tag\">telas 1A/1B<\u002Fspan><p>Capa (3:2/2:3), título, autor, nota em estrelas, trecho. Variações grid e lista. Construído sobre o <code>Card<\u002Fcode> base.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Estrelas de nota (Rating)<\u002Fh4><span class=\"tag\">telas 1,2,3<\u002Fspan><p>Leitura (★ + valor textual) e entrada (operável por teclado). Significado não depende só de cor.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Carrossel de destaque<\u002Fh4><span class=\"tag\">tela 1<\u002Fspan><p>Sem giro automático; setas prev/próx com foco; slides-link; indicadores de posição. Padrão de acessibilidade próprio.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Barra de filtros + ordenação<\u002Fh4><span class=\"tag\">tela 1<\u002Fspan><p>Grupo de selects rotulados (gênero, autor, nota, ordenar) que filtram a lista sem perder foco.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Busca<\u002Fh4><span class=\"tag\">tela 1<\u002Fspan><p>Campo + botão; estado vazio “sem resultados” com recuperação. Reusa <code>Field<\u002Fcode> + <code>Button<\u002Fcode>.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Ficha técnica (metadados)<\u002Fh4><span class=\"tag\">tela 2<\u002Fspan><p>Lista de definição autor/editora/ISBN/ano/páginas/idioma/tradução. Rótulos em micro-caixa.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Botão recomendar + contador<\u002Fh4><span class=\"tag\">tela 2<\u002Fspan><p>Toggle com estado e contagem textual atualizada de forma anunciável.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Item de comentário<\u002Fh4><span class=\"tag\">telas 2,4<\u002Fspan><p>Autor + texto (+ data). Variante pública (aprovado) e variante de moderação.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Item da fila de moderação<\u002Fh4><span class=\"tag\">tela 4<\u002Fspan><p>Comentário + resenha vinculada + grupo de ações aprovar/rejeitar/excluir.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Upload de capa<\u002Fh4><span class=\"tag\">tela 3<\u002Fspan><p>Dropzone com botão real e <code>alt<\u002Fcode> obrigatório; pré-visualização 2:3.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Paginação<\u002Fh4><span class=\"tag\">telas 1,4<\u002Fspan><p>‹/› + números, página atual com <code>aria-current<\u002Fcode>.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Estado vazio (Empty state)<\u002Fh4><span class=\"tag\">telas 1,2,4<\u002Fspan><p>Ícone + título + texto (+ ação). Em <code>role=\"status\"<\u002Fcode>; usado em busca, comentários e fila.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Resumo de erros do formulário<\u002Fh4><span class=\"tag\">tela 3<\u002Fspan><p>Bloco <code>role=\"alert\"<\u002Fcode> no topo + foco no 1º campo inválido. Complementa o <code>Field<\u002Fcode>.<\u002Fp><\u002Fdiv>\n      <div class=\"inv-card\"><h4>Contador / badge<\u002Fh4><span class=\"tag\">tela 4<\u002Fspan><p>Pílula numérica de pendentes; variante zero (neutra).<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
